name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  java:
    name: Java 17
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package desktop app
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Read project version
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(mvn --batch-mode --no-transfer-progress help:evaluate -Dexpression=project.version -q -DforceStdout)"
          printf 'version=%s\n' "${version}" >> "${GITHUB_OUTPUT}"
      - name: Smoke-test executable JAR
        shell: bash
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail
          [[ "$(java -Djava.awt.headless=true -jar "target/integradraw-${VERSION}.jar" --version)" == "IntegraDraw ${VERSION}" ]]
      - name: Create SHA-256 checksum
        shell: bash
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: sha256sum "target/integradraw-${VERSION}.jar" target/bom.json > target/SHA256SUMS
      - name: Upload desktop build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integradraw-desktop
          path: |
            target/integradraw-${{ steps.metadata.outputs.version }}.jar
            target/bom.json
            target/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  web:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck and test
        run: npm run check
      - name: Build Page
        run: npm run build
